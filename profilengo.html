<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #fff5ec, #ffe3d1);
}

/* CENTER SCREEN */
.container {
    width: 390px;
    display: flex;
    overflow: hidden;
    margin: auto;
    position: relative;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,120,0,0.30), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(255,60,0,0.25), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(255,180,0,0.20), transparent 40%),
      linear-gradient(180deg, #ffe9db 0%, #ffd8c2 100%);
  
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* PROFILE CARD */
.profile-card {
    width: 320px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* IMAGE */
.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* TEXT */
.location {
    color: gray;
}

.rating {
    margin: 5px 0 15px;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-around;
    margin: 15px 0;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 15px;
    cursor: pointer;
}

.primary {
    background: linear-gradient(90deg, #ff6b00, #ff8c42);
    color: white;
}

.secondary {
    background: #eee;
}

/* NAVBAR */
 
.navbar{
        position: absolute;
        bottom:0;
        left:50%;
        transform:translateX(-50%);
        
        width:390px;
        height:50px;
        
        background:white;
        
        display:flex;
        justify-content:space-around;
        align-items:center;
        
        border-top:1px solid #eee;
        border-radius: 20px 20px 0 0;
        box-shadow:0 -4px 10px rgba(0,0,0,0.08);
        }
    .navbarSS div{
    text-align:center;
    font-size:13px;
    }
.actions {
    margin-top: 20px;
}

.action-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #f5f5f5;
    text-align: left;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.action-btn:hover {
    background: #ffe3d1;
}

.logout {
    background: #ffe5e5;
    color: red;
}
</style>

</head>

<body>

<div class="container">

    <div class="profile-card">

        <img src="https://randomuser.me/api/portraits/men/45.jpg" class="avatar">

        <h2>Helping Hands NGO</h2>
        <p class="location">📍 Pune</p>
        <p class="rating">⭐ 4.8 Rating</p>

        <div class="stats">
            <div>
                🍱<br><b>120</b><br>Meals
            </div>
            <div>
                🚚<br><b>45</b><br>Deliveries
            </div>
        </div>

        <div class="actions">

            <button class="action-btn">
                ✏️ Edit Profile
            </button>
        
            <button class="action-btn">
                ⚙️ Settings
            </button>
        
            <button class="action-btn">
                🔔 Notifications
            </button>
        
            <button class="action-btn">
                ❓ Help & Support
            </button>
        
            <button class="action-btn logout" onclick="logout()">
                🚪 Logout
            </button>
        
        </div>
    </div>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="ngo_dashboard.html">
    <div>🏠<br>Home</div></a>
    <a href="request.html">
    <div>📦<br> Requests </div> </a>
    <a href="pickup.html">
    <div>🚚<br>Pickup</div></a>
    <div>👤<br>Profile</div></a>
    
    </div>
<script>
function goHome() {
    window.location.href = "dashboard.html";
}

function goRequests() {
    window.location.href = "ngo.html";
}

function goPickup() {
    window.location.href = "pickup.html";
}

function logout() {
    alert("Logged out");
    window.location.href = "login.html";
}
</script>

</body>
</html>
