<!DOCTYPE html>
<html>
<head>
<title>BhukhaMat Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="mobile-container">
    
    <div class="signup-card">
    
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Name">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <p id="password-error" style="color:red; font-size:12px; margin:5px 0;"></p>
    
    <input type="password" id="confirm" placeholder="Confirm Password">
    
    <p id="confirm-error" style="color:red; font-size:12px;"></p>
    <button type="button" onclick="signup()" class="signup-btn">
    Sign Up
    </button>
    
    <p class="login-link">
    Already have an account? 
    <a href="login.html">Login</a>
    </p>
    
    </div>
    
    </div>
    <div id="popup" class="popup">
        <div class="popup-box">
          <p id="popup-message">Signup successful ✅</p>
          <button onclick="closePopup()">OK</button>
        </div>
      </div>

      <script>
        function signup(){
        
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let confirm = document.getElementById("confirm").value;
        
            // simple validation
            if(!name || !email || !password || !confirm){
                alert("Fill all fields ❌");
                return;
            }
        
            if(password !== confirm){
                alert("Passwords do not match ❌");
                return;
            }
        
            // temporary save (only for demo)
            localStorage.setItem("email", email);
            localStorage.setItem("password", password);
        
            alert("Signup successful ✅");
        
            window.location.href = "login.html";
        }
        </script>
</body>
</html>
