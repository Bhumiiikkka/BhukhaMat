<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Track Donation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

.container {
    max-width: 390px;
    margin: auto;
    background: white;
    min-height: 100vh;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,120,0,0.30), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(255,60,0,0.25), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(255,180,0,0.20), transparent 40%),
      linear-gradient(180deg, #ffe9db 0%, #ffd8c2 100%);
}/* HEADER */
.header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #ff6b00;
}

.map {
    width: 100%;
    height: 220px;
    overflow: hidden;
    border-radius: 0 0 20px 20px;
}

.map iframe {
    width: 100%;
    height: 100%;
}
/* STATUS */
.status-box {
    background: #fff3e6;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
}

.status-title {
    font-size: 18px;
    font-weight: bold;
}

.time {
    color: gray;
}

/* PROGRESS BAR */
.progress {
    margin: 20px 10px;
}

.bar {
    height: 6px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    width: 75%;
    height: 100%;
    background: #ff6b00;
    animation: move 2s infinite alternate;
}

@keyframes move {
    from {width: 60%;}
    to {width: 85%;}
}

/* TIMELINE */
.step {
    display: flex;
    align-items: center;
    margin: 10px;
}

.circle {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 10px;
}

.active {
    background: #ff6b00;
}

/* RIDER CARD */
.rider {
    margin: 15px;
    padding: 15px;
    background: #e6fff2;
    border-radius: 15px;
    display: flex;
    align-items: center;
}

.rider img {
    width: 50px;
    border-radius: 50%;
    margin-right: 10px;
}

.call-btn {
    margin-left: auto;
    background: #ff6b00;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
}

/* NGO */
.ngo {
    margin: 15px;
    font-weight: bold;
}

/* BUTTON */
.button {
    margin: 15px;
    width: calc(100% - 30px);
    padding: 12px;
    border: none;
    background: #ff6b00;
    color: white;
    font-size: 16px;
    border-radius: 10px;
}
.rider {
    transition: 0.3s;
}

.rider:hover {
    transform: scale(1.05);
}

.button {
    transition: 0.3s;
}

.button:hover {
    background: #e65c00;
}

</style>

</head>

<body>
    <div class="container">
   <!-- MAP FIRST -->
   <div class="map">
    <iframe 
        src="https://maps.google.com/maps?q=pune&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>
</div>


<div class="status-box">
    <div class="status-title">On the way 🚚</div>
    <div class="time">Arriving in 10 mins</div>
</div>

<div class="progress">
    <div class="bar">
        <div class="fill"></div>
    </div>
</div>

<div class="step">
    <div class="circle active"></div> Accepted
</div>
<div class="step">
    <div class="circle active"></div> Picked
</div>
<div class="step">
    <div class="circle active"></div> On the way
</div>
<div class="step">
    <div class="circle"></div> Delivered
</div>

<div class="rider">
    <img src="https://randomuser.me/api/portraits/men/32.jpg">
    <div>
        <strong>Rahul (Rider)</strong><br>
        ⭐ 4.8
    </div>
    <button class="call-btn">Call</button>
</div>

<div class="ngo">
    Helping Hands NGO, Pune
</div>

<button class="button" onclick="goBack()">Back</button>

</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
    
        // MAP INIT
        var map = L.map('map').setView([18.5204, 73.8567], 13);
    
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
    
        // ROUTE
        var route = [
            [18.5204, 73.8567],
            [18.5215, 73.8575],
            [18.5230, 73.8590],
            [18.5245, 73.8610],
            [18.5265, 73.8630],
            [18.5285, 73.8660],
            [18.5300, 73.8700]
        ];
    
        // DRAW LINE
        L.polyline(route, {color: '#ff6b00', weight: 5}).addTo(map);
    
        // TRUCK ICON
        var truckIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1995/1995574.png',
            iconSize: [35, 35]
        });
    
        // MARKER
        var marker = L.marker(route[0], {icon: truckIcon}).addTo(map);
    
        // ETA UPDATE (SAFE)
        var eta = 10;
        var etaText = document.querySelector(".status-box");
    
        if (etaText) {
            setInterval(() => {
                if (eta > 1) {
                    eta--;
                    etaText.innerHTML = "<b>On the way 🚚</b><br>Arriving in " + eta + " mins";
                }
            }, 5000);
        }
    
        // SMOOTH MOVEMENT
        var i = 0;
    
        function moveTruck() {
            if (i < route.length - 1) {
    
                let start = route[i];
                let end = route[i + 1];
    
                let step = 0;
                let steps = 60;
    
                let interval = setInterval(() => {
    
                    let lat = start[0] + (end[0] - start[0]) * (step / steps);
                    let lng = start[1] + (end[1] - start[1]) * (step / steps);
    
                    marker.setLatLng([lat, lng]);
    
                    step++;
    
                    if (step > steps) {
                        clearInterval(interval);
                        i++;
                        moveTruck();
                    }
    
                }, 50);
    
            } else {
                marker.bindPopup("🎉 Donation Delivered!").openPopup();
            }
        }
    
        moveTruck();
    
    });
    </script>
    <script>
        function goBack(){
            window.history.back()
        }
    </script>
</body>
</html>
