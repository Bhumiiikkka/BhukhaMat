<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* MOBILE FRAME */
.mobile {
    width: 360px;
    height: 640px;
    margin: 20px auto;
    background: white;
    border-radius: 25px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}

/* TOP BAR */
.top-bar {
    padding: 15px;
    font-weight: bold;
    font-size: 16px;
}

/* MAP */
.map {
    height: 50%;
}

.map iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* CARD */
.card {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 18px;
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    box-shadow: 0 -8px 25px rgba(0,0,0,0.1);
    box-sizing: border-box;
}

/* STATUS */
.status {
    color: #ff6b00;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
}

/* LEFT SIDE */
.left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 14px;
}

/* RIGHT SIDE */
.right {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: right;
    font-size: 14px;
    max-width: 55%;
    word-wrap: break-word;
}

/* PROGRESS BAR */
.progress-bar {
    width: 100%;
    height: 6px;
    background: #eee;
    border-radius: 10px;
    margin: 15px 0;
}

.progress {
    width: 70%;
    height: 100%;
    background: #ff6b00;
    border-radius: 10px;
}

/* BUTTON */
.button {
    width: 100%;
    padding: 13px;
    background: #ff6b00;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 15px;
}

/* RIDER */
.rider {
    display: flex;
    align-items: center;
    margin-top: 10px;
}

.rider img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
}
</style>

</head>

<body>

<div class="mobile">

    <!-- TOP -->
    <div class="top-bar">🚚 Delivery Tracking</div>

    <!-- MAP -->
    <div class="map">
        <iframe 
        src="https://maps.google.com/maps?q=pune&t=&z=13&ie=UTF8&iwloc=&output=embed">
        </iframe>
    </div>

    <!-- CARD -->
    <div class="card">

        <div class="status">On the way</div>

        <div class="row">
            <span>📍 Pickup</span>
            <span>Andheri</span>
        </div>

        <div class="row">
            <span>🏁 Drop</span>
            <span>Helping Hands NGO</span>
        </div>

        <!-- PROGRESS -->
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="row">
            <span>⏱ ETA</span>
            <span>10 mins</span>
        </div>

        <!-- RIDER -->
        <div class="rider">
            <img src="https://i.pravatar.cc/100">
            <div>
                <strong>Rahul (Rider)</strong><br>
                ⭐ 4.8 Rating
            </div>
        </div>
        <button class="button" onclick="deliverOrder()">Mark Delivered</button>


    </div>

</div>

<script>
function deliver() {
    alert("Delivery Completed ✅");
    window.location.href = "rider.html";
}
</script>

<script>
    function deliverOrder() {
      fetch("http://127.0.0.1:8000/deliver/1", {
        method: "POST"
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
      });
    }
    </script>>
</body>
</html>
