<!DOCTYPE html>
<html>
<head>
    <title>Rewards</title>
    <link rel="stylesheet" href="reward.css">
</head>

<body>

<div class="mobile-container">

    <!-- TOP IMAGE -->
    <div class="top-banner"></div>

    <!-- TITLE -->
    <h2 class="main-title">Your Rewards 🎁</h2>

    <!-- CARD -->
    <div class="reward-card">

        <p class="subtitle">Total Points</p>
        <h1 class="points">250 💛</h1>

        <!-- LEVEL -->
        <div class="level-box">
            <p>Level: Silver 🥈</p>
        </div>

        <!-- BADGES -->
        <p class="subtitle">Badges</p>
        <div class="badges">
            <div class="badge">🥇 First Donation</div>
            <div class="badge">🍱 Food Saver</div>
            <div class="badge">💛 Kind Heart</div>
        </div>

        <!-- REDEEM -->
        <button class="redeem-btn">Redeem Rewards</button>

    </div>

</div>
<script>
function goToRewards(){
    window.location.href = "reward.html";
}
</script>
</body>
</html>
