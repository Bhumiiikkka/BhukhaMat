<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* MOBILE */
.mobile {
    width: 360px;
    height: 640px;
    margin: 20px auto;
    background: white;
    border-radius: 25px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,120,0,0.30), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(255,60,0,0.25), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(255,180,0,0.20), transparent 40%),
      linear-gradient(180deg, #ffe9db 0%, #ffd8c2 100%);

}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
}

/* PROFILE IMAGE */
.header img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
}

/* NAME */
.name {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
}

.stat {
    text-align: center;
}

/* OPTIONS */
.option {
    padding: 15px 20px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

/* BUTTON */
.logout {
    margin: 20px;
    padding: 12px;
    background: #ff6b00;
    color: white;
    border: none;
    border-radius: 10px;
    width: calc(100% - 40px);
}

/* NAVBAR */
.navbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    text-decoration: none;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #eee;
}

.navbar a {
    text-align: center;
    font-size: 12px;
    text-decoration: none;
    color: black;
}
</style>

</head>

<body>

<div class="mobile">

    <!-- HEADER -->
    <div class="header">
        <img src="https://i.pravatar.cc/100">
        <div class="name">Rahul (Rider)</div>
        ⭐ 4.8 Rating
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <strong>45</strong><br>Deliveries
        </div>
        <div class="stat">
            <strong>120</strong><br>Meals Delivered
        </div>
    </div>

    <!-- OPTIONS -->
    <div class="option">✏️ Edit Profile</div>
    <div class="option">⚙️ Settings</div>
    <div class="option">🔔 Notifications</div>
    <div class="option">❓ Help & Support</div>

    <!-- LOGOUT -->
    <button class="logout">Logout</button>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="rider.html">🏠<br>Home</a>
        <a href="rider-track.html">🗺️<br>Track</a>
        <a href="#">👤<br>Profile</a>
    </div>

</div>

</body>
</html>
